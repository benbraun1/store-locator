<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Trouver un revendeur — Les Imprimeuses</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:        #54215D;
      --brand-dot:    #D5A3FF;
      --brand-light:  #F4EEF6;
      --brand-mid:    #E8D5EE;
      --text:         #1a1a1a;
      --text-muted:   #6b6b6b;
      --text-dim:     #aaaaaa;
      --bg:           #ffffff;
      --surface:      #fafafa;
      --border:       #ebebeb;
      --radius:       10px;
      --sidebar-w:    300px;
      --drawer-peek:  72px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    /* ── SIDEBAR (desktop) ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      height: 100vh;
    }

    #sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header .logo {
      margin-bottom: 12px;
    }

    #sidebar-header .logo img {
      width: 140px;
      height: auto;
      display: block;
    }

    #sidebar-header h1 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    #store-count {
      padding: 10px 20px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    #store-count span {
      color: var(--brand);
      font-weight: 500;
    }

    #store-list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    #store-list::-webkit-scrollbar { width: 3px; }
    #store-list::-webkit-scrollbar-track { background: transparent; }
    #store-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .store-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    .store-item:hover { background: var(--brand-light); }
    .store-item.active { background: var(--brand-light); }

    .store-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--brand-dot);
      box-shadow: 0 0 0 2px rgba(213,163,255,0.25);
    }

    .store-info { flex: 1; min-width: 0; }

    .store-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .store-city {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── MAP ── */
    #map-wrap {
      flex: 1;
      position: relative;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius) !important;
      box-shadow: 0 4px 24px rgba(84,33,93,0.12) !important;
      border: 1px solid var(--brand-mid) !important;
      padding: 0 !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
    }

    .leaflet-popup-tip {
      background: white !important;
    }

    .popup-inner {
      padding: 12px 16px;
    }

    .popup-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .popup-city {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── LOADING OVERLAY ── */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 500;
      gap: 14px;
    }

    #loading.hidden { display: none; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--brand-mid);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* ── MOBILE DRAWER ── */
    #drawer {
      display: none; /* shown via media query */
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 30px rgba(84,33,93,0.15);
      z-index: 300;
      /* Max height = presque tout l'écran */
      max-height: calc(100dvh - 60px);
      height: calc(100dvh - 60px);
      /* Au repos : seul le peek (72px) dépasse du bas */
      transform: translateY(calc(100% - var(--drawer-peek)));
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      will-change: transform;
    }

    #drawer.open {
      transform: translateY(0);
    }

    #drawer-handle {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0 10px;
      cursor: pointer;
      flex-shrink: 0;
      gap: 4px;
    }

    #drawer-handle .handle-bar {
      width: 36px;
      height: 4px;
      background: var(--brand-mid);
      border-radius: 2px;
    }

    #drawer-handle .handle-label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    #drawer.open #drawer-handle .handle-label {
      opacity: 0;
    }

    #drawer-count {
      padding: 4px 20px 10px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    #drawer-count span { color: var(--brand); font-weight: 500; }

    #drawer-list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: 40px;
    }

    #drawer-list::-webkit-scrollbar { width: 3px; }
    #drawer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .drawer-inner {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── MOBILE MAP HEIGHT ── */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #drawer { display: flex; flex-direction: column; }

      #app {
        flex-direction: column;
        height: 100dvh;
      }

      #map-wrap {
        flex: 1;
        height: 100dvh;
      }

      /* Espace en bas pour que le peek du drawer ne cache pas les contrôles */
      .leaflet-bottom {
        bottom: calc(var(--drawer-peek) + 8px) !important;
      }
    }

    /* ── ATTRIBUTION ── */
    .leaflet-control-attribution {
      font-size: 9px !important;
    }

    /* Tile filter — light map */
    .leaflet-tile {
      filter: saturate(0.7) brightness(1.02);
    }
  </style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR (desktop only) -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">
        <img id="logo-img" src="" alt="Les Imprimeuses" />
      </div>
      <h1>Trouver un revendeur</h1>
    </div>
    <div id="store-count">Chargement…</div>
    <div id="store-list"></div>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <div id="map"></div>

    <!-- Loading overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <p>Chargement des boutiques…</p>
    </div>
  </div>

</div>

<!-- MOBILE DRAWER -->
<div id="drawer">
  <div class="drawer-inner">
    <div id="drawer-handle">
      <div class="handle-bar"></div>
      <div class="handle-label" id="drawer-label">Voir les boutiques</div>
    </div>
    <div id="drawer-count"></div>
    <div id="drawer-list"></div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let allStores = [];
let markers   = {};
let selectedId = null;
let drawerOpen = false;

// ── MAP INIT ──────────────────────────────────────────────────────────────────
const map = L.map("map", {
  zoomControl: true,
  tap: true,
}).setView([47.5, 5], 5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ── LOGO ──────────────────────────────────────────────────────────────────────
document.getElementById("logo-img").src = "data:image/png;base64," + LOGO_B64;

// ── PARSE CSV ─────────────────────────────────────────────────────────────────
function parseCSV(csvText) {
  const result = Papa.parse(csvText, { header: true, skipEmptyLines: true });
  const rows   = result.data.filter(r => (r["Top Row"] || "").toLowerCase() === "true");

  const now = new Date();
  const twelveMonthsAgo = new Date();
  twelveMonthsAgo.setMonth(twelveMonthsAgo.getMonth() - ACTIVE_MONTHS);

  const stores = [];
  rows.forEach((r, i) => {
    const totalOrders = parseInt(r["Total Orders"]) || 0;
    if (totalOrders === 0) return;

    const lastOrderDate = r["Last Order: Processed At"] ? new Date(r["Last Order: Processed At"]) : null;
    if (!lastOrderDate) return;

    // Publique : uniquement actifs (< 12 mois)
    if (lastOrderDate < twelveMonthsAgo) return;

    const lat = parseFloat((r["_lat"] || "").toString().replace(",", ".")) || null;
    const lng = parseFloat((r["_lng"] || "").toString().replace(",", ".")) || null;

    const city    = r["Address City"]    || "";
    const country = r["Address Country"] || "";
    if (!city && !country) return;

    stores.push({
      id:   r["ID"] || String(i),
      name: r["Address Company"] || `${r["First Name"] || ""} ${r["Last Name"] || ""}`.trim(),
      city,
      country,
      lat,
      lng,
    });
  });

  // Tri alphabétique pour la version publique
  stores.sort((a, b) => a.name.localeCompare(b.name, "fr", { sensitivity: "base" }));
  return stores;
}

// ── MARKER ────────────────────────────────────────────────────────────────────
function makeMarker(store) {
  const icon = L.divIcon({
    className: "",
    html: `<div style="
      width:13px;height:13px;
      border-radius:50%;
      background:${DOT_COLOR};
      border:2px solid ${DOT_BORDER};
      box-shadow:0 0 0 3px rgba(213,163,255,0.2), 0 2px 6px rgba(0,0,0,0.15);
      cursor:pointer;
      transition:all 0.15s;
    "></div>`,
    iconSize: [13, 13],
    iconAnchor: [6, 6],
  });

  return L.marker([store.lat, store.lng], { icon })
    .addTo(map)
    .on("click", () => selectStore(store.id));
}

// ── SELECT STORE ──────────────────────────────────────────────────────────────
function selectStore(id) {
  selectedId = id;
  const store = allStores.find(s => s.id === id);
  if (!store) return;

  // Highlight dans les listes
  document.querySelectorAll(".store-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === id);
  });

  // Highlight marker
  allStores.forEach(s => {
    const m = markers[s.id];
    if (!m) return;
    const sel = s.id === id;
    const size = sel ? 18 : 13;
    m.setIcon(L.divIcon({
      className: "",
      html: `<div style="
        width:${size}px;height:${size}px;
        border-radius:50%;
        background:${DOT_COLOR};
        border:2px solid ${DOT_BORDER};
        box-shadow:0 0 0 ${sel ? 5 : 3}px rgba(213,163,255,${sel ? 0.35 : 0.2}), 0 2px 6px rgba(0,0,0,0.15);
        cursor:pointer;
        transition:all 0.15s;
      "></div>`,
      iconSize: [size, size],
      iconAnchor: [size/2, size/2],
    }));
    m.setZIndexOffset(sel ? 1000 : 0);
  });

  // Popup légère
  const location = store.country && store.country !== "France"
    ? `${store.city}, ${store.country}`
    : store.city;

  L.popup({ closeButton: false, offset: [0, -6], maxWidth: 220 })
    .setLatLng([store.lat, store.lng])
    .setContent(`
      <div class="popup-inner">
        <div class="popup-name">${store.name}</div>
        ${location ? `<div class="popup-city">${location}</div>` : ""}
      </div>`)
    .openOn(map);

  // Sur mobile : ouvrir le drawer et scroller sur l'item
  if (window.innerWidth <= 768) {
    openDrawer();
  }

  const activeItem = document.querySelector(`.store-item[data-id="${id}"]`);
  if (activeItem) activeItem.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

// ── RENDER LISTS ──────────────────────────────────────────────────────────────
function renderLists(stores) {
  const localized = stores.filter(s => s.lat && s.lng);
  const count = localized.length;
  const countText = `<span>${count}</span> boutique${count > 1 ? "s" : ""} dans cette zone`;

  document.getElementById("store-count").innerHTML = countText;
  document.getElementById("drawer-count").innerHTML = countText;
  document.getElementById("drawer-label").textContent =
    `${count} boutique${count > 1 ? "s" : ""} — glisser pour voir`;

  const renderItem = (store, container) => {
    const el = document.createElement("div");
    el.className = "store-item";
    if (store.id === selectedId) el.classList.add("active");
    el.dataset.id = store.id;
    const loc = store.country && store.country !== "France"
      ? `${store.city}, ${store.country}`
      : store.city;
    el.innerHTML = `
      <div class="store-dot"></div>
      <div class="store-info">
        <div class="store-name">${store.name}</div>
        ${loc ? `<div class="store-city">${loc}</div>` : ""}
      </div>`;
    el.addEventListener("click", () => selectStore(store.id));
    container.appendChild(el);
  };

  ["store-list", "drawer-list"].forEach(listId => {
    const el = document.getElementById(listId);
    el.innerHTML = "";
    localized.forEach(s => renderItem(s, el));
  });
}

// ── APPLY BOUNDS FILTER ───────────────────────────────────────────────────────
function applyBounds() {
  const bounds = map.getBounds();
  const visible = allStores.filter(s =>
    s.lat && s.lng && bounds.contains([s.lat, s.lng])
  );
  renderLists(visible);
}

// ── DRAWER (mobile) ───────────────────────────────────────────────────────────
function openDrawer() {
  drawerOpen = true;
  document.getElementById("drawer").classList.add("open");
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById("drawer").classList.toggle("open", drawerOpen);
}

document.getElementById("drawer-handle").addEventListener("click", toggleDrawer);

// Swipe gesture on drawer
let touchStartY = 0;
const drawer = document.getElementById("drawer");

drawer.addEventListener("touchstart", e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

drawer.addEventListener("touchend", e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 60) { drawerOpen = false; drawer.classList.remove("open"); }
  if (dy < -60) { drawerOpen = true; drawer.classList.add("open"); }
}, { passive: true });

// Tap on map closes drawer on mobile
map.on("click", () => {
  if (window.innerWidth <= 768 && drawerOpen) {
    drawerOpen = false;
    drawer.classList.remove("open");
  }
  selectedId = null;
  document.querySelectorAll(".store-item").forEach(el => el.classList.remove("active"));
});

// ── MAIN ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    allStores  = parseCSV(text);

    // Create markers
    allStores.forEach(s => {
      if (s.lat && s.lng) markers[s.id] = makeMarker(s);
    });

    // Initial render
    applyBounds();
    map.on("moveend", applyBounds);

    document.getElementById("loading").classList.add("hidden");
  } catch (err) {
    document.getElementById("loading").innerHTML =
      `<p style="color:#c00">Erreur de chargement</p>`;
    console.error(err);
  }
}

init();
</script>
